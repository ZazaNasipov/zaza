<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaza | Bozkurt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader" onclick="enter()">
        <div class="loader-content">
            <span class="click-hint">İLERLEMEK İÇİN TIKLA</span>
        </div>
    </div>

    <video id="bg-video" loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div id="site" class="site-hidden">
        <header>
            <div class="logo-area">
                <h1 class="logo">ZA<span>ZA</span></h1>
                <div class="subtitle">Bozkurt'un İzinde</div>
            </div>
        </header>

        <main class="content-container">
            <div class="glass-panel">
                <span class="panel-badge">TENGRİ BİZ MENEN</span>
                <h2 class="panel-title">Bozkırın Özgür Ruhu</h2>
                <p class="panel-text">
                    Bozkırın ortasında yalnız ve özgür, tıpkı bir kurt gibi. 
                    Tengri'nin ışığında, yalnızlığın gücüyle kadere meydan okuyan bir ruh.
                </p>
                <div class="divider"></div>
                <div class="social-links">
                    <a href="https://www.instagram.com/nasipov_z" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
                    <a href="https://youtube.com/@zaza_bzkr" target="_blank" class="social-btn"><i class="fab fa-youtube"></i></a>
                    <a href="https://discord.gg/MMj2NkZNp" target="_blank" class="social-btn"><i class="fab fa-discord"></i></a>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-stats">
                <div class="stat-item"><i class="far fa-clock"></i> <span id="clock">00:00:00</span></div>
                <div class="stat-item"><i class="fas fa-users"></i> <span id="views">2,481</span></div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
