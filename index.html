<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaza | BMW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader" onclick="enter()">
        <div class="loader-content-minimal">
            <h1 class="loader-logo-zaza">ZAZA</h1>
            <div class="loader-divider"></div>
            <span class="click-hint-minimal">GİRİŞ YAPMAK İÇİN TIKLA</span>
        </div>
    </div>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div id="site" class="site-hidden">
        <header>
            <h1 class="logo">ZA<span>ZA</span></h1>
        </header>

        <main class="content-container">
            <div class="glass-panel">
                <h2 class="panel-title">BMW</h2>
                <p class="panel-text">
                    Mavi-beyaz logo, asfaltta sert bir fırtına,<br>
                    Böbrek ızgaralar hırçın, bakıyor her yanına.<br>
                    M Power kükrerse, yollarda kalmaz sessiz.
                </p>
                <div class="divider"></div>
                <div class="social-links">
                    <a href="https://www.instagram.com/nasipov_z" target="_blank" rel="noopener" class="social-btn"><i class="fab fa-instagram"></i></a>
                    <a href="https://youtube.com/@zaza_bzkr" target="_blank" rel="noopener" class="social-btn"><i class="fab fa-youtube"></i></a>
                    <a href="https://discord.gg/wJz5pnHkjY" target="_blank" rel="noopener" class="social-btn"><i class="fab fa-discord"></i></a>
                </div>
            </div>
        </main>

        <footer>
            <div class="stat-item"><i class="far fa-clock"></i> <span id="clock">00:00:00</span></div>
            <div class="stat-item"><span id="views">...</span> <i class="fas fa-users"></i></div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
